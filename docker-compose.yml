services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: removi_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "${APP_PORT}"
    expose:
      - "${APP_PORT}"

  nginx:
    image: nginx:latest
    container_name: removi_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "127.0.0.1:${NGINX_HTTPS_PORT}:${NGINX_HTTPS_PORT}"
      - "${NGINX_HTTP_PORT}:${NGINX_HTTP_PORT}"
    expose:
      - "${NGINX_HTTPS_PORT}"
    environment:
      APP_PORT: "${APP_PORT}"
      NGINX_HTTPS_PORT: "${NGINX_HTTPS_PORT}"
      NGINX_HTTP_PORT: "${NGINX_HTTP_PORT}"
      SITE_DOMAIN: "${SITE_DOMAIN}"
    command: >
      /bin/sh -c "envsubst '$$APP_PORT $$NGINX_HTTPS_PORT $$NGINX_HTTP_PORT $$SITE_DOMAIN'
      < /etc/nginx/templates/nginx.conf.template
      > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ${CERT_FULLCHAIN_PATH}:/etc/nginx/certs/fullchain.pem:ro
      - ${CERT_PRIVKEY_PATH}:/etc/nginx/certs/priv.key:ro